<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1b4332 0%, #00b4d8 100%);
            --accent-color: #00b4d8;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --bg-body: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.7;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 2em;
        }

        h1 { font-size: 3em; margin-top: 0; letter-spacing: -2px; }
        h2 { font-size: 2em; }
        h3 { font-size: 1.5em; }

        p, li {
            font-size: 1.1em;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        a:hover { opacity: 0.7; }

        /* Dashboard specific */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .dash-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .dash-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: #fff;
        }

        .dash-card h3 {
            margin: 0 0 10px 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dash-card p {
            font-size: 0.95em;
            color: var(--text-muted);
            margin: 0;
        }

        /* Images */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin: 20px 0;
            display: block;
        }

        /* Nav links */
        .back-link, .next-link {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            background: #eee;
            margin: 20px 0;
            font-size: 0.9em;
        }

        .next-link {
            background: var(--primary-gradient);
            color: white !important;
            float: right;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(0,0,0,0.1);
            margin: 40px 0;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #121212;
                --text-main: #e0e0e0;
                --text-muted: #b0b0b0;
                --card-bg: #1e1e1e;
                --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }
            .dash-card {
                background: rgba(30, 30, 30, 0.7);
                border-color: rgba(255, 255, 255, 0.05);
            }
            .dash-card:hover { background: #252525; }
            .back-link { background: #333; }
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>
    
    <!-- Mermaid Support -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({ 
        startOnLoad: true, 
        theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default',
        securityLevel: 'loose'
      });
    </script>
</body>
</html>
